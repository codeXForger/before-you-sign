name: Feature request
description: Suggest an idea or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: The use case or pain point, not just the solution.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: constraints
    attributes:
      label: Constraints
      options:
        - label: This does not require a database or server-side storage
        - label: This does not add telemetry, analytics, or third-party tracking
        - label: This keeps the BYOK model intact
